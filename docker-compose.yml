version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: devlens_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: devlens_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: devlens_db
    restart: always
    environment:
      POSTGRES_DB: devlens_db
      POSTGRES_USER: devlens_user
      POSTGRES_PASSWORD: devlens_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: